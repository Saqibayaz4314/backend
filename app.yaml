name: ciro-backend
services:
- name: api
  github:
    branch: main
    repo: YOUR_GITHUB_USERNAME/CIRO-AISeekho2026-Hackathon-main
    deploy_on_push: true
  source_dir: backend
  dockerfile_path: Dockerfile
  http_port: 8000
  health_check:
    http_path: /health
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    success_threshold: 2
    failure_threshold: 3
  envs:
  - key: GEMINI_API_KEY
    scope: RUN_TIME
    value: ${GEMINI_API_KEY}
  - key: FIREBASE_PROJECT_ID
    scope: RUN_TIME
    value: antigravity-af708
  - key: FIREBASE_CREDENTIALS_JSON
    scope: RUN_TIME
    value: ${FIREBASE_CREDENTIALS_JSON}
  - key: PORT
    scope: RUN_TIME
    value: "8000"
  - key: HOST
    scope: RUN_TIME
    value: "0.0.0.0"
  - key: PRODUCTION_MODE
    scope: RUN_TIME
    value: "false"
  - key: RATE_LIMIT_ENABLED
    scope: RUN_TIME
    value: "true"
  - key: CACHE_ENABLED
    scope: RUN_TIME
    value: "true"
